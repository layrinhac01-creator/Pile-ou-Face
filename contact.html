        body {

            display: flex;

            align-items: center;
            justify-content: center;
            padding: 20px;
        }

            background-color: #fff;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            max-width: 400px;
            width: 100%;

        }

            color: #4a5568;
        }

        .info-line strong {
            color: #2d3748;
            display: inline-block;
            width: 110px; /* On passe de 90px à 110px pour donner de la place */
        }
        /* --- BLOC COMMENTAIRES (ASIDE) --- */

            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
        }
        footer a {

            text-decoration: none;
        }
