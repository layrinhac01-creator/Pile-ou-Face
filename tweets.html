    <style>
        /* --- STYLES GENERAUX DE LA PAGE --- */
        body {
            background-color: #f4f6f9;
            color: #333;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;

        /* --- LIEN TOP EXTÉRIEUR MANDATAIRE --- */
        .top-link {
            text-align: center;
            padding: 10px;

        }
        .top-link a {
            color: #4a5568;

            text-decoration: none;
        }

        /* --- BARRE DE NAVIGATION (HEADER) --- */
        header {
            background-color: #2d3748;
            padding: 15px;
        }
        header ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        header ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
        header ul li a:hover {
            color: #cbd5e0;
        }

        /* --- ZONE CENTRALE DE LA PAGE (MAIN) --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        article {
            background-color: #fff;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            color: #2d3748;
            font-size: 2rem;
        }

        p {
            color: #4a5568;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* --- BOUTON DU TWEET STYLE X --- */
        .tweet-button {
            display: inline-block;
            background-color: #1da1f2;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            padding: 14px 35px;
            border-radius: 25px;
            transition: background-color 0.2s;
            box-shadow: 0 4px 10px rgba(29, 161, 242, 0.3);
        }
        .tweet-button:hover {
            background-color: #1a91da;
        }

        /* --- BLOC COMMENTAIRES (ASIDE) --- */
        aside {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #a0aec0;
        }

        /* --- FOOTER REGLEMENTAIRE --- */
        footer {
            background-color: #1a202c;
            color: #fff;
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
        }
        footer a {
            color: #63b3ed;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
